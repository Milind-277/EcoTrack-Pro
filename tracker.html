<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack Pro - Daily Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo"><i class="fas fa-leaf text-primary"></i> EcoTrack Pro</a>
    <ul class="nav-links">
      <li><a href="index.html" class="auth-required">Dashboard</a></li>
      <li><a href="tracker.html" class="auth-required">Tracker</a></li>
      <li><a href="insights.html" class="auth-required">Insights</a></li>
      <li><a href="reports.html" class="auth-required">Reports</a></li>
      <li><a href="simulator.html" class="auth-required">Simulator</a></li>
      <li><a href="leaderboard.html" class="auth-required">Leaderboard</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i></button>
      <div id="navAvatar" class="user-avatar-mini auth-required">U</div>
      <button class="logout-btn auth-required" id="navLogout" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <div class="container fade-in" style="max-width: 800px;">
    
    <div class="glass-panel text-center mb-4">
      <h2 class="text-2xl"><i class="fas fa-clipboard-list text-primary"></i> Daily Log</h2>
      <p class="text-muted">Log your daily activities to calculate today's emissions and earn points.</p>
    </div>

    <form id="trackerForm">
      
      <!-- Transport -->
      <div class="glass-panel mb-4">
        <h3><i class="fas fa-car text-secondary"></i> Transport</h3>
        <div class="grid grid-cols-2 mt-2">
          <div class="form-group">
            <label>Distance (km)</label>
            <input type="number" id="transportDist" min="0" value="0" required>
          </div>
          <div class="form-group">
            <label>Primary Mode</label>
            <select id="transportMode">
              <option value="car">Car (Fuel)</option>
              <option value="public_transport">Public Transport</option>
              <option value="bike">Bike / Walk (Zero Emission)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Electricity -->
      <div class="glass-panel mb-4">
        <h3><i class="fas fa-bolt text-warning"></i> Electricity</h3>
        <div class="grid grid-cols-3 mt-2">
          <div class="form-group">
            <label>AC Usage (hrs)</label>
            <input type="number" id="acHours" min="0" value="0" required>
          </div>
          <div class="form-group">
            <label>Fan Usage (hrs)</label>
            <input type="number" id="fanHours" min="0" value="0" required>
          </div>
          <div class="form-group">
            <label>Other Apps. (hrs)</label>
            <input type="number" id="applianceHours" min="0" value="0" required>
          </div>
        </div>
      </div>

      <!-- Food & Water -->
      <div class="grid grid-cols-2 mb-4">
        <div class="glass-panel">
          <h3><i class="fas fa-utensils text-danger"></i> Diet</h3>
          <div class="form-group mt-2">
            <label>Primary Diet Today</label>
            <select id="foodType">
              <option value="non_veg">Non-Vegetarian</option>
              <option value="veg">Vegetarian</option>
              <option value="processed">Highly Processed</option>
            </select>
          </div>
        </div>
        <div class="glass-panel">
          <h3><i class="fas fa-tint text-secondary"></i> Water Usage</h3>
          <div class="form-group mt-2">
            <label>Approx. Liters</label>
            <input type="number" id="waterLiters" min="0" value="100" required>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block text-xl">
        <i class="fas fa-save"></i> Save Log & Earn Points
      </button>

    </form>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.EcoAuth.requireAuth();

      const form = document.getElementById('trackerForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const logData = {
          transportDist: parseFloat(document.getElementById('transportDist').value) || 0,
          transportMode: document.getElementById('transportMode').value,
          acHours: parseFloat(document.getElementById('acHours').value) || 0,
          fanHours: parseFloat(document.getElementById('fanHours').value) || 0,
          applianceHours: parseFloat(document.getElementById('applianceHours').value) || 0,
          foodType: document.getElementById('foodType').value,
          waterLiters: parseFloat(document.getElementById('waterLiters').value) || 0
        };

        const result = window.EcoData.addDailyLog(logData);
        window.App.showToast(`Logged! Emission: ${result.total} kg. Earned ${result.pointsEarned} points!`, 'success');
        
        // Trigger gamification checks immediately after log
        window.checkGamification();

        // Optional: Redirect to Dashboard after brief delay
        setTimeout(() => window.location.href = 'index.html', 1500);
      });
    });
  </script>
</body>
</html>
