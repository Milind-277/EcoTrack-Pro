<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack Pro - Authentication</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex items-center justify-center" style="min-height: 100vh; margin: 0;">

  <div class="glass-panel fade-in-up" style="max-width: 450px; width: 100%; padding: 2rem;">
    
    <div class="text-center mb-4">
      <a href="index.html" class="logo justify-center" style="font-size: 2rem;">
        <i class="fas fa-leaf text-primary"></i> EcoTrack Pro
      </a>
      <p class="text-muted mt-2">Sign in to start tracking your footprint</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <div style="position: relative;">
          <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 18px; color: var(--text-muted);"></i>
          <input type="email" id="loginEmail" placeholder="you@example.com" style="padding-left: 45px;" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position: relative;">
          <i class="fas fa-lock" style="position: absolute; left: 15px; top: 18px; color: var(--text-muted);"></i>
          <input type="password" id="loginPass" placeholder="••••••••" style="padding-left: 45px;" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2">Sign In</button>
      
      <p class="text-center mt-4 text-sm">
        Don't have an account? <a href="#" id="toSignup" class="text-primary font-bold" style="text-decoration: none;">Create one</a>
      </p>
    </form>

    <!-- Signup Form (Hidden by default) -->
    <form id="signupForm" style="display: none;">
      <div class="form-group">
        <label>Full Name</label>
        <div style="position: relative;">
          <i class="fas fa-user" style="position: absolute; left: 15px; top: 18px; color: var(--text-muted);"></i>
          <input type="text" id="signupName" placeholder="John Doe" style="padding-left: 45px;" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div style="position: relative;">
          <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 18px; color: var(--text-muted);"></i>
          <input type="email" id="signupEmail" placeholder="you@example.com" style="padding-left: 45px;" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position: relative;">
          <i class="fas fa-lock" style="position: absolute; left: 15px; top: 18px; color: var(--text-muted);"></i>
          <input type="password" id="signupPass" placeholder="••••••••" style="padding-left: 45px;" required minlength="6">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2">Create Account</button>
      
      <p class="text-center mt-4 text-sm">
        Already have an account? <a href="#" id="toLogin" class="text-primary font-bold" style="text-decoration: none;">Sign in</a>
      </p>
    </form>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // If already logged in, redirect
    if(window.EcoData && window.EcoData.getCurrentUser()) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
