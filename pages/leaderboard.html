<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack Pro | Leaderboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../components/navbar.js" defer></script>
  <script src="../components/footer.js" defer></script>
  <script src="../js/data.js" defer></script>
  <script src="../js/logic.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/charts.js" defer></script>
  <script src="../js/ui.js" defer></script>
  <script src="../js/tests.js" defer></script>
</head>
<body data-page="leaderboard">
  <app-navbar></app-navbar>
  <main class="container" id="main">
    <header class="page-header">
      <div>
        <p class="eyebrow">Gamification</p>
        <h1>Leaderboard</h1>
        <p>Simulated national rankings with your live score inserted and ranked fairly.</p>
      </div>
      <div class="glass metric"><div class="metric-label">Your rank</div><div class="metric-value" id="myRank">...</div></div>
    </header>
    <section class="glass mb" aria-labelledby="podiumTitle">
      <h2 id="podiumTitle">Top 3</h2>
      <div class="podium" id="podium"></div>
    </section>
    <section class="glass" aria-labelledby="rankingTitle">
      <h2 id="rankingTitle">Top 10 rankings</h2>
      <div id="leaderboardList" aria-live="polite"></div>
    </section>
  </main>
  <app-footer></app-footer>
</body>
</html>
