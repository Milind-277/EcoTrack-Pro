<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack Pro - Leaderboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo"><i class="fas fa-leaf text-primary"></i> EcoTrack Pro</a>
    <ul class="nav-links">
      <li><a href="index.html" class="auth-required">Dashboard</a></li>
      <li><a href="tracker.html" class="auth-required">Tracker</a></li>
      <li><a href="insights.html" class="auth-required">Insights</a></li>
      <li><a href="reports.html" class="auth-required">Reports</a></li>
      <li><a href="simulator.html" class="auth-required">Simulator</a></li>
      <li><a href="leaderboard.html" class="auth-required">Leaderboard</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i></button>
      <div id="navAvatar" class="user-avatar-mini auth-required">U</div>
      <button class="logout-btn auth-required" id="navLogout" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <div class="container fade-in" style="max-width: 800px;">
    
    <div class="glass-panel text-center mb-4">
      <h2 class="text-3xl"><i class="fas fa-medal text-warning"></i> Global Leaderboard</h2>
      <p class="text-muted">See how you rank against other Eco Warriors based on total points.</p>
    </div>

    <div class="glass-panel table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 10%;">Rank</th>
            <th style="width: 50%;">User</th>
            <th style="width: 20%;">Streak</th>
            <th style="width: 20%; text-align: right;">Points</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.EcoAuth.requireAuth();
      const user = window.EcoData.getCurrentUser();

      // Mock Data
      let mockUsers = [
        { name: 'Sarah Jenkins', streak: 45, points: 3450 },
        { name: 'Michael Chen', streak: 30, points: 2800 },
        { name: 'Emma Watson', streak: 28, points: 2650 },
        { name: 'David Smith', streak: 12, points: 1200 },
        { name: 'Alex Johnson', streak: 5, points: 450 }
      ];

      if(user) {
        mockUsers.push({
          name: user.name + ' (You)',
          streak: user.streak,
          points: user.points,
          isCurrentUser: true
        });
      }

      // Sort by points descending
      mockUsers.sort((a, b) => b.points - a.points);

      const tbody = document.getElementById('leaderboardBody');
      mockUsers.forEach((u, index) => {
        const rank = index + 1;
        let rankHtml = `<strong>#${rank}</strong>`;
        if(rank === 1) rankHtml = `<i class="fas fa-crown text-warning"></i>`;
        if(rank === 2) rankHtml = `<i class="fas fa-medal" style="color: #C0C0C0;"></i>`;
        if(rank === 3) rankHtml = `<i class="fas fa-medal" style="color: #CD7F32;"></i>`;

        const rowStyle = u.isCurrentUser ? 'background: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--primary-color);' : '';

        const tr = document.createElement('tr');
        tr.style.cssText = rowStyle;
        tr.innerHTML = `
          <td>${rankHtml}</td>
          <td class="font-bold ${u.isCurrentUser ? 'text-primary' : ''}">${u.name}</td>
          <td>${u.streak} <i class="fas fa-fire text-primary text-sm"></i></td>
          <td style="text-align: right;" class="font-bold">${u.points} <i class="fas fa-star text-warning text-sm"></i></td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
